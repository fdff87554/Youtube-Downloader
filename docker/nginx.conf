worker_processes auto;
pid /tmp/nginx.pid;
# Send logs to the container's stdout/stderr so `docker logs` works and
# we never need to chown /var/log/nginx for non-root operation.
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;

    sendfile on;
    keepalive_timeout 65;

    # Compress text-like responses. Vite already produces minified output,
    # so the win comes mostly from gzipping the index.html shell.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Defense-in-depth rate limit. The application also enforces per-route
    # limits with slowapi; this zone catches abusive clients before they
    # reach uvicorn.
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_status 429;

    # Temp paths for non-root operation
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    # Defense-in-depth response headers. The site is also expected to be
    # fronted by a TLS-terminating proxy that adds HSTS.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://*.ytimg.com https://*.googleusercontent.com data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    server {
        listen 8080;

        # Serve static frontend files
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Vite emits content-hashed filenames under /assets/, so the
        # response body for a given URL never changes -- cache aggressively.
        location /assets/ {
            root /var/www/html;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
            try_files $uri =404;
        }

        # Reverse proxy API requests to uvicorn
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            # API responses are dynamic and must never be cached.
            add_header Cache-Control "no-store" always;

            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Streaming support: disable buffering for download responses
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}
