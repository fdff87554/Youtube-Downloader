[tools]
# Python and Node 仍 pin major.minor，避免 runtime 跳版破壞 lockfile
python = "3.12"
node = "22"
# Formatter / linter 採 latest 浮動，pre-commit autoupdate 可同步 revs
ruff = "latest"
yamlfmt = "latest"
shfmt = "latest"
shellcheck = "latest"
# uv 用於 lockfile 重生（uv pip compile）與依賴安裝
uv = "latest"

[env]
_.python.venv = { path = ".venv", create = true }
