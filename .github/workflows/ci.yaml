name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v4
      - name: Cache pip downloads
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Cache npm downloads
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements-dev.lock
          pip install -e backend --no-deps
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit checks
        run: python -m pre_commit run --all-files
      - name: Run backend tests
        run: cd backend && python -m pytest tests/ -v
      - name: Run frontend tests
        run: cd frontend && npm test
      - name: Build frontend
        run: cd frontend && npm run build
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v4
      - name: Cache pip downloads
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audit-${{ hashFiles('backend/requirements*.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-audit-
      - name: Cache npm downloads
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: npm audit (frontend)
        run: cd frontend && npm audit --audit-level=high
      - name: pip-audit (backend)
        run: |
          pip install pip-audit
          python -m pip_audit -r backend/requirements.lock --strict
          python -m pip_audit -r backend/requirements-dev.lock --strict
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
