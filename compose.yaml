services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # Set ALLOWED_ORIGINS to your frontend origin (or a comma-separated
      # list) for any internet-facing deployment. Leaving it unset is only
      # permitted when DEBUG=true (local development); the application
      # refuses to start otherwise. See README "Quick start" for examples.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - DEBUG=${DEBUG:-false}
    restart: unless-stopped
